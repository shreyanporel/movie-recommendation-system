<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMatch — Movie Recommendations</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #12121a;
        --surface2: #1a1a26;
        --border: rgba(255, 255, 255, 0.07);
        --border-hover: rgba(255, 255, 255, 0.15);
        --text: #f0ede8;
        --muted: #8a8790;
        --accent: #e8c87a;
        --accent2: #c47a5a;
        --score-high: #7ac87a;
        --score-mid: #c8b87a;
        --score-low: #c87a7a;
        --font-display: "Playfair Display", Georgia, serif;
        --font-body: "DM Sans", system-ui, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.6;
        min-height: 100vh;
      }

      /* ---- NOISE OVERLAY ---- */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
      }

      /* ---- LAYOUT ---- */
      .shell {
        position: relative;
        z-index: 1;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem 2.5rem;
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(10, 10, 15, 0.85);
      }

      .logo {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-style: italic;
        color: var(--accent);
        letter-spacing: -0.02em;
      }

      .logo span {
        color: var(--text);
        font-style: normal;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .user-field {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 99px;
        padding: 0.35rem 0.35rem 0.35rem 1rem;
        transition: border-color 0.2s;
      }

      .user-field:focus-within {
        border-color: var(--accent);
      }

      .user-field label {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .user-field input {
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 15px;
        width: 60px;
        text-align: center;
      }

      .btn-load {
        background: var(--accent);
        color: #0a0a0f;
        border: none;
        border-radius: 99px;
        padding: 0.45rem 1.1rem;
        font-family: var(--font-body);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s;
        letter-spacing: 0.02em;
      }

      .btn-load:hover {
        opacity: 0.88;
      }
      .btn-load:active {
        transform: scale(0.97);
      }

      /* ---- HERO ---- */
      .hero {
        padding: 3.5rem 2.5rem 2rem;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 2rem;
      }

      .hero-title {
        font-family: var(--font-display);
        font-size: clamp(2.4rem, 5vw, 3.8rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
        max-width: 540px;
      }

      .hero-title em {
        font-style: italic;
        color: var(--accent);
        display: block;
      }

      .hero-sub {
        color: var(--muted);
        font-size: 14px;
        max-width: 280px;
        text-align: right;
        line-height: 1.8;
      }

      /* ---- SECTION LABEL ---- */
      .section-label {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
        padding: 0 2.5rem;
      }

      .section-label h2 {
        font-family: var(--font-display);
        font-size: 1.3rem;
        font-weight: 400;
        letter-spacing: -0.01em;
      }

      .section-label .pill {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 99px;
        font-size: 11px;
        color: var(--muted);
        padding: 2px 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      /* ---- MOVIE SCROLL TRACK ---- */
      .scroll-section {
        margin-bottom: 3rem;
      }

      .track-wrap {
        overflow-x: auto;
        padding: 0 2.5rem 1rem;
        scrollbar-width: thin;
        scrollbar-color: var(--surface2) transparent;
      }

      .track-wrap::-webkit-scrollbar {
        height: 4px;
      }
      .track-wrap::-webkit-scrollbar-thumb {
        background: var(--surface2);
        border-radius: 2px;
      }

      .track {
        display: flex;
        gap: 1rem;
        width: max-content;
      }

      /* ---- MOVIE CARD ---- */
      .card {
        width: 200px;
        flex-shrink: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.2s,
          transform 0.2s;
        position: relative;
      }

      .card:hover {
        border-color: var(--border-hover);
        transform: translateY(-3px);
      }

      .card-poster {
        height: 130px;
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        position: relative;
        overflow: hidden;
      }

      .card-poster::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(transparent, var(--surface));
      }

      .card-score {
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 7px;
        border-radius: 99px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .card-body {
        padding: 0.75rem;
      }

      .card-title {
        font-family: var(--font-display);
        font-size: 0.9rem;
        line-height: 1.3;
        margin-bottom: 0.4rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-genres {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .genre-tag {
        font-size: 10px;
        color: var(--muted);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 6px;
        letter-spacing: 0.04em;
      }

      /* ---- SIMILAR PANEL ---- */
      .similar-section {
        margin: 0 2.5rem 3rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: none;
      }

      .similar-section.active {
        display: block;
      }

      .similar-header {
        padding: 1.1rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .similar-header h3 {
        font-family: var(--font-display);
        font-size: 1rem;
        font-weight: 400;
      }

      .similar-header .based-on {
        font-style: italic;
        color: var(--accent);
      }

      .btn-close {
        background: none;
        border: 1px solid var(--border);
        border-radius: 99px;
        color: var(--muted);
        font-size: 12px;
        padding: 3px 12px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      .btn-close:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }

      .similar-track {
        display: flex;
        gap: 1rem;
        padding: 1.25rem 1.5rem;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--surface2) transparent;
      }

      /* ---- SEARCH BAR ---- */
      .search-wrap {
        padding: 0 2.5rem 2rem;
      }

      .search-inner {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.6rem 1rem;
        max-width: 480px;
        transition: border-color 0.2s;
      }

      .search-inner:focus-within {
        border-color: rgba(232, 200, 122, 0.4);
      }

      .search-icon {
        color: var(--muted);
        font-size: 14px;
      }

      .search-inner input {
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 14px;
        flex: 1;
      }

      .search-inner input::placeholder {
        color: var(--muted);
      }

      /* ---- TRENDING TABLE ---- */
      .trending-section {
        margin: 0 2.5rem 3rem;
      }

      .trending-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .trending-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.85rem 1.25rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: none;
        cursor: pointer;
        transition: background 0.15s;
      }

      .trending-row:first-child {
        border-top: 1px solid var(--border);
        border-radius: 10px 10px 0 0;
      }
      .trending-row:last-child {
        border-radius: 0 0 10px 10px;
      }
      .trending-row:hover {
        background: var(--surface2);
      }

      .trending-rank {
        font-family: var(--font-display);
        font-size: 1.3rem;
        font-style: italic;
        color: var(--muted);
        width: 28px;
        text-align: right;
        flex-shrink: 0;
      }

      .trending-info {
        flex: 1;
        min-width: 0;
      }

      .trending-title {
        font-weight: 500;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .trending-genres {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }

      .trending-cta {
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 99px;
        padding: 3px 10px;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      .trending-row:hover .trending-cta {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ---- STATES ---- */
      .empty {
        padding: 3rem 2.5rem;
        text-align: center;
        color: var(--muted);
      }

      .empty p {
        font-size: 14px;
        margin-top: 0.5rem;
      }

      .empty-icon {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        opacity: 0.4;
      }

      .spinner-wrap {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 2rem 2.5rem;
        color: var(--muted);
        font-size: 14px;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ---- TOAST ---- */
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 99px;
        padding: 0.6rem 1.5rem;
        font-size: 13px;
        color: var(--muted);
        transition: transform 0.3s ease;
        pointer-events: none;
        z-index: 999;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }

      /* ---- DIVIDER ---- */
      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 0 2.5rem 2.5rem;
      }

      /* ---- RESPONSIVE ---- */
      @media (max-width: 640px) {
        header {
          padding: 1rem 1rem;
        }
        .hero {
          padding: 2rem 1rem 1.5rem;
          flex-direction: column;
          align-items: flex-start;
        }
        .hero-sub {
          text-align: left;
        }
        .section-label,
        .search-wrap,
        .track-wrap,
        .trending-section,
        .similar-section {
          padding-left: 1rem;
          padding-right: 1rem;
        }
        .similar-section {
          margin: 0 1rem 2rem;
        }
        .trending-section {
          margin: 0 1rem 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <!-- HEADER -->
      <header>
        <div class="logo">Cine<span>Match</span></div>
        <div class="header-controls">
          <div class="user-field">
            <label>User ID</label>
            <input type="number" id="userId" value="1" min="1" />
          </div>
          <button class="btn-load" onclick="loadAll()">Load ↗</button>
        </div>
      </header>

      <!-- HERO -->
      <div class="hero">
        <h1 class="hero-title">
          Your next<br /><em>favourite film</em><br />awaits.
        </h1>
        <p class="hero-sub">
          Personalised picks powered by what you've already loved. Explore
          similar titles or discover what everyone's watching.
        </p>
      </div>

      <!-- SEARCH -->
      <div class="search-wrap">
        <div class="search-inner">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="movieSearch"
            placeholder="Search movie name..."
            min="1"
            onkeydown="if (event.key === 'Enter') findSimilar();"
          />
          <button class="btn-close" onclick="findSimilar()">
            Find similar
          </button>
        </div>
      </div>

      <!-- SIMILAR PANEL -->
      <div class="similar-section" id="similarSection">
        <div class="similar-header">
          <h3>
            Because you looked at
            <span class="based-on" id="basedOnTitle"></span>
          </h3>
          <button class="btn-close" onclick="closeSimilar()">✕ Close</button>
        </div>
        <div class="similar-track" id="similarTrack"></div>
      </div>

      <!-- FOR YOU -->
      <section class="scroll-section">
        <div class="section-label">
          <h2>Picked for you</h2>
          <span class="pill">Personalised</span>
        </div>
        <div class="track-wrap">
          <div class="track" id="forYouTrack">
            <div class="spinner-wrap">
              <div class="spinner"></div>
              Loading recommendations…
            </div>
          </div>
        </div>
      </section>

      <hr class="divider" />

      <!-- TRENDING -->
      <section class="trending-section">
        <div class="section-label" style="padding: 0; margin-bottom: 1rem">
          <h2>Trending now</h2>
          <span class="pill">Popular</span>
        </div>
        <div id="trendingList">
          <div class="spinner-wrap">
            <div class="spinner"></div>
            Loading trending…
          </div>
        </div>
      </section>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const API = "http://localhost:8000";

      const genreEmoji = {
        Action: "🎬",
        Adventure: "🌄",
        Animation: "🎨",
        Comedy: "😄",
        Crime: "🔍",
        Documentary: "🎥",
        Drama: "🎭",
        Fantasy: "🧙",
        Horror: "👻",
        Musical: "🎵",
        Mystery: "🕵️",
        Romance: "💛",
        "Sci-Fi": "🚀",
        Thriller: "🫀",
        War: "⚔️",
        Western: "🤠",
      };

      function posterFor(genres) {
        if (!genres || !genres.length) return "🎬";
        for (const g of genres) {
          if (genreEmoji[g]) return genreEmoji[g];
        }
        return "🎬";
      }

      function scoreColor(s) {
        if (s >= 70) return "var(--score-high)";
        if (s >= 40) return "var(--score-mid)";
        return "var(--score-low)";
      }

      function makeCard(m, onclick) {
        const genres = Array.isArray(m.genres)
          ? m.genres
          : (m.genres || "").split("|").filter(Boolean);
        const title = m.title || "Untitled";
        const score = m.score != null ? m.score : null;
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = onclick || (() => triggerSimilar(m.movieId, title));
        card.innerHTML = `
    <div class="card-poster">
      ${posterFor(genres)}
      ${score != null ? `<div class="card-score" style="color:${scoreColor(score)}">${score}%</div>` : ""}
    </div>
    <div class="card-body">
      <div class="card-title">${title}</div>
      <div class="card-genres">${genres
        .slice(0, 3)
        .map((g) => `<span class="genre-tag">${g}</span>`)
        .join("")}</div>
    </div>
  `;
        return card;
      }

      function renderTrack(trackEl, movies, onclick) {
        trackEl.innerHTML = "";
        if (!movies || !movies.length) {
          trackEl.innerHTML = `<div class="empty"><div class="empty-icon">🎞</div><p>Nothing found</p></div>`;
          return;
        }
        movies.forEach((m) =>
          trackEl.appendChild(makeCard(m, onclick ? () => onclick(m) : null)),
        );
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      async function loadAll() {
        const uid = parseInt(document.getElementById("userId").value) || 1;
        loadForYou(uid);
        loadTrending();
        closeSimilar();
      }

      async function loadForYou(uid) {
        const track = document.getElementById("forYouTrack");
        track.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div>Personalising…</div>`;
        try {
          const res = await fetch(`${API}/recommend/${uid}`);
          const data = await res.json();
          renderTrack(track, data.recommendations);
          if (!data.recommendations?.length)
            showToast("No history found — showing trending instead");
        } catch (e) {
          track.innerHTML = `<div class="empty"><div class="empty-icon">⚡</div><p>Could not reach the API. Make sure the backend is running at <code>${API}</code></p></div>`;
        }
      }

      async function loadTrending() {
        const list = document.getElementById("trendingList");
        list.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div>Loading…</div>`;
        try {
          const res = await fetch(`${API}/trending`);
          const data = await res.json();
          const movies = data.trending || [];
          if (!movies.length) {
            list.innerHTML = `<div class="empty"><p>Nothing trending</p></div>`;
            return;
          }
          list.innerHTML = "";
          const ul = document.createElement("div");
          ul.className = "trending-list";
          movies.forEach((m, i) => {
            const genres = Array.isArray(m.genres)
              ? m.genres
              : (m.genres || "").split("|").filter(Boolean);
            const title = m.title || "Untitled";
            const row = document.createElement("div");
            row.className = "trending-row";
            row.onclick = () => triggerSimilar(m.movieId, title);
            row.innerHTML = `
        <div class="trending-rank">${i + 1}</div>
        <div class="trending-info">
          <div class="trending-title">${title}</div>
          <div class="trending-genres">${genres.slice(0, 4).join(" · ")}</div>
        </div>
        <span class="trending-cta">Similar →</span>
      `;
            ul.appendChild(row);
          });
          list.appendChild(ul);
        } catch (e) {
          list.innerHTML = `<div class="empty"><div class="empty-icon">⚡</div><p>Could not reach the API.</p></div>`;
        }
      }

      async function triggerSimilar(movieId, title) {
        const sec = document.getElementById("similarSection");
        const track = document.getElementById("similarTrack");
        const basedOn = document.getElementById("basedOnTitle");
        sec.classList.add("active");
        basedOn.textContent = title || `Movie #${movieId}`;
        track.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div>Finding similar…</div>`;
        sec.scrollIntoView({ behavior: "smooth", block: "nearest" });
        try {
          const res = await fetch(`${API}/similar/${movieId}`);
          const data = await res.json();
          if (data.error) {
            track.innerHTML = `<div class="empty"><p>${data.error}</p></div>`;
            return;
          }
          renderTrack(track, data.similar_movies);
        } catch (e) {
          track.innerHTML = `<div class="empty"><p>Could not load similar movies.</p></div>`;
        }
      }

      async function findSimilar() {
        const query = document.getElementById("movieSearch").value.trim();

        if (!query) {
          showToast("Enter a movie name");
          return;
        }

        try {
          const res = await fetch(
            `${API}/search?query=${encodeURIComponent(query)}`,
          );
          const data = await res.json();

          if (!data.results.length) {
            showToast("No movies found");
            return;
          }

          // Take first match
          const movie = data.results[0];

          // Trigger similar using its ID
          triggerSimilar(movie.movieId, movie.title);
        } catch (e) {
          showToast("Search failed");
        }
      }

      function closeSimilar() {
        document.getElementById("similarSection").classList.remove("active");
      }

      // Auto-load on page start
      loadAll();
    </script>
  </body>
</html>
